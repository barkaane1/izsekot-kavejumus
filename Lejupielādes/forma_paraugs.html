<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Reģistrācija IT konferencei</title>
</head>
<body>

    <div>
        <h1>Piesakies IT konferencei!</h1>
        <p>Aizpildi formu, lai rezervētu savu dalību.</p>
        
        <form method="GET">
            <label for="vards">Lietotājvārds:</label><br>
            <input type="text" id="vards" name="vards" placeholder="Piemēram, koda_meistars" required><br><br>

            <label for="email">E-pasts:</label><br>
            <input type="email" id="email" name="email" placeholder="vards@piemers.lv" required><br><br>

            <label for="parole">Parole:</label><br>
            <input type="password" id="parole" name="parole" placeholder="Ievadi drošu paroli"><br><br>

            <label for="interese">Interešu joma:</label><br>
            <select id="interese" name="interese">
                <option value="web">Web izstrāde</option>
                <option value="data">Datu zinātne</option>
                <option value="ai">Mākslīgais intelekts</option>
            </select><br><br>

            <label>
                <input type="checkbox" name="jaunumi" value="ja"> Pierakstīties jaunumiem
            </label><br><br>

            <input type="submit" value="Reģistrēties">
        </form>
    </div>

</body>
</html>
